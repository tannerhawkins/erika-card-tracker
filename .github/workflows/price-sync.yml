name: Sync card prices

on:
  schedule:
    # 13:24 UTC daily — an off-the-hour time to avoid GitHub's cron congestion.
    - cron: '24 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    # Reuses the same secrets as the card-list sync (Settings → Environments → production).
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Sync prices to Google Sheet
        env:
          SHEETS_API_URL: ${{ secrets.VITE_SHEETS_API_URL }}
          SHEETS_SYNC_TOKEN: ${{ secrets.SHEETS_SYNC_TOKEN }}
          JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
        run: node scripts/sync-prices.mjs
